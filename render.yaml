services:
  # Backend API Service
  - type: web
    name: mlx-direct-api
    plan: free
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        value: mongodb+srv://<db_user>:<password>@cluster0.p2cwdjy.mongodb.net/ # Set in Render Dashboard
      - key: JWT_SECRET
        value: YOUR_JWT_SECRET # Set in Render Dashboard
      - key: FRONTEND_URL
        value: https://mlxdirect.com
      - key: ADMIN_URL
        value: https://mlxdirect.com
      - key: MOBILE_WEB_URL
        value: https://mlxdirect.com
      - key: FIREBASE_CONFIG_JSON
        value: '{"type":"service_account","project_id":"your-project-id"}' # Set full JSON in Render Dashboard
      - key: ADMIN_EMAIL
        value: admin@mlxdirect.com
      - key: ADMIN_PASSWORD
        value: YOUR_ADMIN_PASSWORD # Set in Render Dashboard

  # Frontend Static Site
  - type: web
    name: mlx-direct-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        from: /api/*
        destination: https://mlx-direct-api.onrender.com/api/*
      - type: rewrite
        from: /*
        to: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mlx-direct-api.onrender.com/api
